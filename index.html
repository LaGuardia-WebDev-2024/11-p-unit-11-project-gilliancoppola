<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Unit 11 Project</title>
    <link href="style.css" rel="stylesheet" type="text/css" />
  </head>
  <body>
    <button id="gui1-button">Guitar #1</button>
    <button id="gui2-button">Guitar #2</button>
    <button id="gui3-button">Guitar #3</button>
    <h1>My Top 3 Guitar Choices <span>This Year</span></h1>
    <ol>
      <li>
        <h3 id="gui1">Guitar #1--The PRS SE DGT Standard David Grissom</h3>
        <p id="prs">More about this guitar.</p>
      </li>

      <li>
        <h3 id="gui2">Guitar #2--The Epiphone Les Paul Standard '50s Figured</h3>
        <p id="epi">More about this guitar.</p>
      </li>

      <li>
        <h3 id="gui3">Guitar #3--Fender Standard Telecaster</h3>
        <p id="tele">More about this guitar.</p>
      </li>
    </ol>

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/2.1.4/jquery.min.js"></script>
    <script>

      // ======================== Button #1
      $("#gui1-button").click(function () {
        $("#gui1").css("color", "purple");
        $("#prs").text("This PRS SE DGT is a very versatile and high-quality guitar.")
      });

      // ======================== Button #2
      $("#gui2-button").click(function () {
        $("#gui2").css("color", "blue");
         $("#epi").text("This Epiphone Les Paul is")
      });

      // ======================== Button #3
      $("#gui3-button").click(function () {
        $("#gui3").css("color", "green");
        $("#tele").text("The Fender Telecaster is");
      });


    </script>
  </body>
</html>
